# NightShift Lobo Kitty
# Swap the active include below to change flavour.
include theme.conf
# include ./nightshift-lobo-eclipse.conf
# include ./nightshift-lobo-shadow.conf
# include ./nightshift-lobo-obsidian.conf
# include ./nightshift-lobo-dawn.conf

# Typography
font_family      FiraCode Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        15.0
adjust_line_height 108%
disable_ligatures never

# Cursor
cursor_shape beam
cursor_blink_interval 0
cursor_stop_blinking_after 0

# Interaction
scrollback_lines 10000
copy_on_select yes
strip_trailing_spaces smart
open_url_modifiers kitty_mod

# Window
remember_window_size yes
initial_window_width 120c
initial_window_height 34c
enabled_layouts splits,stack,tall
window_border_width 1
window_margin_width 8
single_window_margin_width 8
window_padding_width 12
inactive_text_alpha 0.82
hide_window_decorations yes
background_opacity 0.96
dynamic_background_opacity no
background_blur 32

# Tabs
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_align left
tab_bar_min_tabs 2
tab_bar_margin_width 0.0
tab_bar_margin_height 2.5 1.5
active_tab_font_style bold
inactive_tab_font_style normal
tab_activity_symbol " ● "
tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{title[:30]}{title[30:] and '…'} [{index}]"
active_tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{title[:30]}{title[30:] and '…'} [{index}]"

# Alerts
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell no
bell_on_tab no

# Shell
shell zsh
editor nvim
shell_integration enabled

# Key bindings
map ctrl+space send_text all \x10

map kitty_mod+b scroll_page_up
map kitty_mod+f scroll_page_down

map kitty_mod+enter no_op
map kitty_mod+enter new_window_with_cwd

map kitty_mod+j previous_window
map kitty_mod+k next_window
map kitty_mod+up move_window_forward
map kitty_mod+down move_window_backward

map kitty_mod+] no_op
map kitty_mod+] next_tab
map kitty_mod+[ no_op
map kitty_mod+[ previous_tab

map kitty_mod+right no_op
map kitty_mod+right move_tab_forward
map kitty_mod+left no_op
map kitty_mod+left move_tab_backward

map kitty_mod+t no_op
map kitty_mod+t new_tab_with_cwd

map kitty_mod+0 no_op
map kitty_mod+0 goto_layout stack
map kitty_mod+9 no_op
map kitty_mod+9 goto_layout tall
map kitty_mod+8 no_op
map kitty_mod+8 goto_layout fat

map kitty_mod+equal change_font_size all +2.0
map kitty_mod+minus change_font_size all -2.0
map kitty_mod+backspace change_font_size all 0
